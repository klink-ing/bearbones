name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel an in-flight run if the same branch gets a new push — saves CI
# minutes on rapid iteration.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          # Match the engines.node floor in package.json. Using a recent
          # 22.x avoids `vp` requiring a newer runtime than CI provides.
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check (lint, format, typecheck, tests)
        run: pnpm run check
